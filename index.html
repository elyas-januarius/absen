<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIG</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body {font-family: sans-serif; display:flex; justify-content: center; align-items: center; height: 100vh;}
        .card {text-align: center; padding: 20px; border: 1px solid #ccc; border-radius: 10px;}
        button {padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px;}
        button:disabled {background: #ccc;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Absen hari ini</h1>
        <button id="btnAbsen"> Klik untuk absen (Masuk)</button>
        <p id="status"></p>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => alert('Service Worker terdaftar!', reg))
                    .catch(err => alert('Gagal daftar Service Worker', err))
            })
        }
    </script>

</body>
</html>
